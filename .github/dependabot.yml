version: 2

updates:
  # npm packages inside web/
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: Asia/Phnom_Penh
    open-pull-requests-limit: 10
    groups:
      react:
        patterns:
          - react
          - react-dom
          - "@types/react"
          - "@types/react-dom"
      next:
        patterns:
          - next
          - eslint-config-next
      tailwind:
        patterns:
          - tailwindcss
          - "@tailwindcss/*"
      testing:
        patterns:
          - vitest
      types:
        patterns:
          - "@types/*"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: Asia/Phnom_Penh
    open-pull-requests-limit: 5

  # Docker base image
  - package-ecosystem: docker
    directory: /web
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: Asia/Phnom_Penh
    open-pull-requests-limit: 3
